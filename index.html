<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Zakat Masjid Baiturrohim Beji</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f1f5f9;
            font-family: sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
        .loading-bar {
            height: 4px;
            background: #065f46;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 99;
            animation: loading 2s infinite;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="loading-bar" id="loader"></div>
    <div class="container">
        <iframe 
            src="MASUKKAN_URL_WEB_APP_GOOGLE_ANDA_DISINI" 
            allow="geolocation; microphone; camera"
            onload="document.getElementById('loader').style.display='none';">
        </iframe>
    </div>
</body>
</html>
