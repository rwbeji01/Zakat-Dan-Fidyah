<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Zakat Masjid Baiturrohim Beji</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041064.png">

    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah double scrollbar */
            background-color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Loading Bar yang lebih halus */
        .loading-bar {
            height: 3px;
            background: linear-gradient(90deg, #065f46 0%, #10b981 50%, #065f46 100%);
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            background-size: 200% 100%;
            animation: moveGradient 1.5s linear infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Iframe Optimization */
        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
            /* Memastikan scrolling halus di perangkat iOS */
            -webkit-overflow-scrolling: touch;
        }

        /* Overlay jika ingin menambahkan watermark/footer kecil */
        .safe-area-inset {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: env(safe-area-inset-bottom);
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="loading-bar" id="loader"></div>

    <div class="container">
        <iframe 
            id="appIframe"
            src="https://script.google.com/macros/s/AKfycbxNPAX3sVSfiqDNtvDcKs7NVSGr2grOERnE-OikanDUsIzsdqqnz6jfRoz05t2r94f0/exec" 
            allow="geolocation; microphone; camera; clipboard-write"
            sandbox="allow-forms allow-modals allow-popups allow-scripts allow-same-origin"
            loading="lazy"
            onload="hideLoader()">
        </iframe>
    </div>

    <div class="safe-area-inset"></div>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }

        // Mencegah zoom berlebih saat input fokus di mobile (opsional)
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
